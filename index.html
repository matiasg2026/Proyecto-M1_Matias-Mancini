<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Paletas</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header>
        <h1>🎨 Generador de Paletas de Colores</h1>
    </header>

    <main>

        <section class="controles">

            <fieldset class="grupo-control">
                <label for="cantidad">
                    Cantidad de colores:
                </label>

                <select id="cantidad">
                    <option value="6">6 colores</option>
                    <option value="8">8 colores</option>
                    <option value="9">9 colores</option>
                </select>
            </fieldset>

            <fieldset class="grupo-control">
                <label for="formato">Formato</label>
                <select id="formato">
                    <option value="hex">HEX</option>
                    <option value="hsl">HSL</option>
                </select>
            </fieldset>

            <button id="generarBtn">
                Generar Paleta
            </button>

        </section>

        <section
            id="paleta"
            class="paleta"
            aria-label="Paleta de colores generada">
        </section>

        <div id="toast" class="toast">
            Paleta generada correctamente
        </div>

    </main>

    <script src="script.js"></script>

    <footer>
        <p>© 2026 - Generador de Paletas de Colores</p>
        <p>Desarrollado por Matías Gabriel Mancini</p>
    </footer>

    <script src="script.js"></script>

</body>
</html>
